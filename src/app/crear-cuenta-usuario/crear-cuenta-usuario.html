<div class="login-container">
  <div class="login-card">
    <h2 class="login-title">Crear Cuenta</h2>
    <form class="login-form"  (ngSubmit)="registrar()" >
      <div class="form-group">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" placeholder="Ingresa tu nombre completo" required>
      </div>

      <div class="form-group">
        <label for="correo">Correo</label>
        <input type="email" id="correo" placeholder="Ingresa tu correo electrónico" required>
      </div>


      <div class="form-group">
        <label for="rol">¿Cómo quieres registrarte?</label>
        <select id="rol" required>
          <option value="" disabled selected>Selecciona tu rol</option>
          <option value="usuario">Usuario</option>
          <option value="editor">Editor</option>
          <option value="comentador">Comentador</option>
        </select>
      </div>

      <div class="form-group">
        <label for="contrasena">Contraseña</label>
        <input type="password" id="contrasena" placeholder="Crea una contraseña" required>
      </div>
      <button type="submit" class="btn-continuar" >Crear cuenta</button>
    </form>
    <div class="register-link-container">
      <a routerLink="/login-usuario" class="login-link">¿Ya tienes una cuenta? Inicia sesión</a>
    </div>
  </div>
</div>
