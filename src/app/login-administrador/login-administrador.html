<div class="login-container">
  <div class="login-card">
    <h2 class="login-title">Iniciar Sesión como administrador</h2>

    <form class="login-form" (ngSubmit)="registrar()">
      <div class="form-group">
        <label for="usuario">Correo</label>
        <input type="text" id="usuario" placeholder="Ingresa tu correo electronico" required>
      </div>

      <div class="form-group">
        <label for="contrasena">Contraseña</label>
        <input type="password" id="contrasena" placeholder="Ingresa tu contraseña" required>
      </div>

      <button type="submit" class="btn-continuar">Continuar</button>
    </form>
  </div>
</div>
