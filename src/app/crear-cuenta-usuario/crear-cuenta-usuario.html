<div class="login-container">
  <div class="login-card">
    <h2 class="login-title">Crear Cuenta</h2>

    <form class="login-form" (ngSubmit)="registrar()">

      <div class="form-group">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" name="nombre" [(ngModel)]="nombre" placeholder="Ingresa tu nombre completo" required>
      </div>

      <div class="form-group">
        <label for="correo">Correo</label>
        <input type="email" id="correo" name="correo" [(ngModel)]="correo" placeholder="Ingresa tu correo electrónico" required>
      </div>

      <div class="form-group">
        <label for="rol">¿Cómo quieres registrarte?</label>
        <select id="rol" name="rol" [(ngModel)]="rol" required>
          <option value="USUARIO">Usuario</option>
          <option value="EDITOR">Editor</option>
          <option value="COMENTADOR">Comentador</option>
        </select>
      </div>

      <div class="form-group">
        <label for="contrasena">Contraseña</label>
        <input type="password" id="contrasena" name="contrasenia" [(ngModel)]="contrasenia" placeholder="Crea una contraseña" required>
      </div>

      <button type="submit" class="btn-continuar">Crear cuenta</button>
    </form>

    <div class="register-link-container">
      <a routerLink="/login-usuario" class="login-link">¿Ya tienes una cuenta? Inicia sesión</a>
    </div>
  </div>
</div>

<div class="modal-overlay" *ngIf="alertaVisible">
  <div class="modal-card">
    <h3 class="modal-titulo">{{ alertaEsExito ? '¡Excelente!' : 'Atención' }}</h3>
    <p class="modal-mensaje">{{ alertaMensaje }}</p>
    <button class="btn-continuar" style="margin-top: 10px;" (click)="cerrarAlerta()">Aceptar</button>
  </div>
</div>
